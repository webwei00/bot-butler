<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.38" r="0.9">
      <stop offset="0" stop-color="#16263f"/>
      <stop offset="1" stop-color="#0a1424"/>
    </radialGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e3c274"/>
      <stop offset="0.5" stop-color="#c9a24b"/>
      <stop offset="1" stop-color="#9a7930"/>
    </linearGradient>
  </defs>
  <!-- deep navy background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <!-- fine brass ring -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="url(#brass)" stroke-width="6" opacity="0.85"/>
  <circle cx="512" cy="512" r="352" fill="none" stroke="url(#brass)" stroke-width="2" opacity="0.4"/>
  <!-- service bell -->
  <g>
    <path d="M 512 330 c 8 0 16 6 16 16 v 18 c 96 10 164 84 172 180 h -376 c 8 -96 76 -170 172 -180 v -18 c 0 -10 8 -16 16 -16 z" fill="url(#brass)"/>
    <circle cx="512" cy="322" r="18" fill="url(#brass)"/>
    <rect x="290" y="556" width="444" height="30" rx="15" fill="url(#brass)"/>
    <!-- bell highlight -->
    <path d="M 420 392 c -34 22 -58 56 -66 96" fill="none" stroke="#f4e3b2" stroke-width="16" stroke-linecap="round" opacity="0.65"/>
  </g>
  <!-- bow tie beneath -->
  <g transform="translate(512,672)">
    <path d="M -12 0 L -118 -52 c -14 -7 -30 3 -30 19 v 66 c 0 16 16 26 30 19 z" fill="url(#brass)"/>
    <path d="M 12 0 L 118 -52 c 14 -7 30 3 30 19 v 66 c 0 16 -16 26 -30 19 z" fill="url(#brass)"/>
    <rect x="-26" y="-26" width="52" height="52" rx="12" fill="#e3c274"/>
  </g>
</svg>
